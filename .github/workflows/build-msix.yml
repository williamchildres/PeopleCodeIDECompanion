name: Build MSIX

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-msix:
    runs-on: windows-latest

    env:
      CONFIGURATION: Release
      PLATFORM: x64
      PROJECT_PATH: PeopleCodeIDECompanion.csproj

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore $env:PROJECT_PATH

      - name: Create CI test-signing certificate
        id: signing
        shell: pwsh
        run: |
          # The manifest publisher is CN=PeopleCodeIDECompanion, so the signing certificate
          # must use the same subject for Windows to trust the package after import.
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject 'CN=PeopleCodeIDECompanion' `
            -KeyUsage DigitalSignature `
            -FriendlyName 'PeopleCodeIDECompanion CI Test Certificate' `
            -CertStoreLocation 'Cert:\CurrentUser\My' `
            -TextExtension @('2.5.29.37={text}1.3.6.1.5.5.7.3.3')

          if (-not $cert) {
            throw 'Failed to create the CI test-signing certificate.'
          }

          $cerPath = Join-Path $env:RUNNER_TEMP 'PeopleCodeIDECompanion.cer'
          Export-Certificate -Cert $cert -FilePath $cerPath | Out-Null

          "thumbprint=$($cert.Thumbprint)" >> $env:GITHUB_OUTPUT
          "cer_path=$cerPath" >> $env:GITHUB_OUTPUT

      - name: Build and package MSIX
        run: >
          dotnet build $env:PROJECT_PATH
          -c $env:CONFIGURATION
          -p:Platform=$env:PLATFORM
          -p:GenerateAppxPackageOnBuild=true
          -p:AppxPackageSigningEnabled=true
          -p:PackageCertificateThumbprint=${{ steps.signing.outputs.thumbprint }}

      - name: Collect packaged outputs
        id: collect
        shell: pwsh
        run: |
          # The package folder name includes the app version, so discover outputs dynamically.
          $msixCandidates = Get-ChildItem -Path 'AppPackages' -Recurse -File -Filter '*.msix' |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 10

          $msix = $msixCandidates | Select-Object -First 1

          if (-not $msix) {
            throw 'No .msix package was found under AppPackages.'
          }

          $signature = Get-AuthenticodeSignature $msix.FullName
          if ($signature.Status -eq 'NotSigned') {
            throw 'The generated .msix is not digitally signed.'
          }

          $artifactDir = Join-Path $env:RUNNER_TEMP 'msix-artifacts'
          $bundleDir = Join-Path $artifactDir 'bundle'
          New-Item -ItemType Directory -Force -Path $artifactDir, $bundleDir | Out-Null

          Copy-Item -Path $msix.FullName -Destination $artifactDir
          Copy-Item -Path $msix.FullName -Destination $bundleDir

          $certificate = $null

          if ('${{ steps.signing.outputs.cer_path }}') {
            $generatedCertificate = '${{ steps.signing.outputs.cer_path }}'
            if (Test-Path $generatedCertificate) {
              $certificate = Get-Item $generatedCertificate
            }
          }

          # Fall back to any AppPackages certificate if export somehow failed.
          if (-not $certificate) {
            $certificateCandidates = @()

            foreach ($candidate in $msixCandidates) {
              $certificateCandidates += Get-ChildItem -Path $candidate.DirectoryName -File -Filter '*.cer' -ErrorAction SilentlyContinue
            }

            if (-not $certificateCandidates) {
              $certificateCandidates = Get-ChildItem -Path 'AppPackages' -Recurse -File -Filter '*.cer' -ErrorAction SilentlyContinue
            }

            $certificate = $certificateCandidates |
              Sort-Object LastWriteTimeUtc -Descending |
              Select-Object -Unique FullName |
              Select-Object -First 1
          }

          if ($certificate) {
            Copy-Item -Path $certificate.FullName -Destination $artifactDir
            Copy-Item -Path $certificate.FullName -Destination $bundleDir
            "cer_path=$($certificate.FullName)" >> $env:GITHUB_OUTPUT
            "cer_name=$($certificate.Name)" >> $env:GITHUB_OUTPUT
          }
          else {
            throw 'No .cer certificate was found for this signed build. Another Windows PC needs the matching certificate to trust and install the MSIX.'
          }

          @"
          Install notes
          =============

          1. Install the included certificate before opening the MSIX if Windows does not already trust it.
          2. To trust it on a test PC, open the .cer file and install it for the current user or local machine.
          3. Import the certificate into Trusted People or Trusted Root Certification Authorities if prompted by your environment.
          4. After the certificate is trusted, open the .msix file to install PeopleCodeIDECompanion.

          This package is currently test-signed for internal testing.
          "@ | Set-Content -Path (Join-Path $bundleDir 'install-note.txt')

          $zipPath = Join-Path $artifactDir 'PeopleCodeIDECompanion-package.zip'
          Compress-Archive -Path (Join-Path $bundleDir '*') -DestinationPath $zipPath -Force

          "msix_path=$($msix.FullName)" >> $env:GITHUB_OUTPUT
          "msix_name=$($msix.Name)" >> $env:GITHUB_OUTPUT
          "artifact_dir=$artifactDir" >> $env:GITHUB_OUTPUT
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: PeopleCodeIDECompanion-msix
          path: ${{ steps.collect.outputs.msix_path }}
          if-no-files-found: error

      - name: Upload certificate artifact
        if: ${{ steps.collect.outputs.cer_path != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: PeopleCodeIDECompanion-certificate
          path: ${{ steps.collect.outputs.cer_path }}
          if-no-files-found: error

      - name: Upload bundled package artifact
        uses: actions/upload-artifact@v4
        with:
          name: PeopleCodeIDECompanion-package
          path: ${{ steps.collect.outputs.zip_path }}
          if-no-files-found: error
